name: Setup Notion Workspace

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Notion setup
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: node scripts/setup-notion.mjs 2>&1 | tee /tmp/notion-output.txt

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notion-setup-output
          path: /tmp/notion-output.txt
