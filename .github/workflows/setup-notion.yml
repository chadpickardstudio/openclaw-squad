name: Setup Notion Workspace

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Notion setup
        id: notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          node scripts/setup-notion.mjs 2>&1 | tee /tmp/notion-output.txt
          echo "output<<ENDOFOUTPUT" >> $GITHUB_OUTPUT
          cat /tmp/notion-output.txt >> $GITHUB_OUTPUT
          echo "ENDOFOUTPUT" >> $GITHUB_OUTPUT

      - name: Post output as issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Notion Setup Output (Run #${{ github.run_number }})" \
            --body "$(cat /tmp/notion-output.txt)" || echo "Failed to create issue"
