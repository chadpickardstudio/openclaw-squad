name: Setup Notion Workspace

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Notion setup
        id: notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          OUTPUT=$(node scripts/setup-notion.mjs 2>&1)
          echo "$OUTPUT"
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post output as commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create an issue comment with the output so we can read it via API
          gh issue create --title "Notion Setup Output (Run #${{ github.run_number }})" --body "${{ steps.notion.outputs.output }}" --label "automation" || true
