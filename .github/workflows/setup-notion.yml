name: Setup Notion Workspace

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run fresh Notion setup
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          node scripts/notion-fresh-setup.mjs 2>&1 | tee /tmp/notion-output.txt

      - name: Post output as issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Notion Fresh Setup (Run #${{ github.run_number }})" \
            --body "$(cat /tmp/notion-output.txt)" || echo "Failed to create issue"
